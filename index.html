<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃什麼</title>
    <meta name="description" content="辦公室揪團點餐系統，趕快來送出你的餐點吧！">
    <meta property="og:title" content="👑 今天吃什麼 - 點餐系統">
    <meta property="og:description" content="辦公室揪團點餐系統，趕快來送出你的餐點吧！">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary: #ff9f43; --danger: #e11d48; --success: #26de81; --bg: #f1f5f9; --dark: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); overflow-x: hidden; }
        .admin-toolbar { display: none; background: var(--dark); padding: 15px; border-radius: 12px; margin-bottom: 20px; color: white; flex-wrap: wrap; gap: 10px; }
        .container { max-width: 1000px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        .status-banner { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .announcement-row { display: flex; justify-content: space-between; align-items: center; }
        .menu-wrapper { width: 100%; display: none; margin-top: 15px; }
        .menu-display { width: 100%; height: auto; border-radius: 12px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .btn { padding: 10px; border: none; border-radius: 6px; background: var(--primary); color: white; cursor: pointer; }
        .btn-del { color: var(--danger); background: none; border: none; cursor: pointer; }
        .admin-checkbox-secret { opacity: 0.1; margin-left: 10px; }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { border: 1px solid #eee; margin-bottom: 10px; padding: 10px; border-radius: 8px; background: white; }
            td { display: flex; justify-content: space-between; }
            td::before { content: attr(data-label); font-weight: bold; color: #64748b; }
        }
    </style>
</head>
<body>

<div class="admin-toolbar" id="adminToolbar">
    <input type="text" id="annInput" placeholder="公告...">
    <input type="text" id="timeInput" placeholder="時間...">
    <button class="btn" onclick="updateAnnouncement()">同步</button>
    <input type="file" accept="image/*" onchange="uploadMenu(this)">
    <button class="btn" onclick="clearOrders()">清空</button>
</div>

<div class="container">
    <div class="status-banner">
        <div class="announcement-row">
            <div style="display:flex; align-items:center;">
                <div id="announceText" style="font-weight:bold; font-size:20px;">📢 收現金 / 收 LINE Pay</div>
                <input type="checkbox" id="adminToggle" class="admin-checkbox-secret">
            </div>
            <div style="font-weight:bold; color:red; font-size:18px;">截止時間：<span id="timeText" style="font-size:32px;">未設定</span></div>
        </div>
    </div>

    <div id="menuWrapper" class="menu-wrapper"><img id="menuImg" class="menu-display"></div>

    <div class="card">
        <h3>📝 點餐</h3>
        <div class="grid">
            <input type="text" id="userName" placeholder="姓名">
            <input type="text" id="userItem" placeholder="品項">
            <input type="number" id="price" placeholder="應付">
            <input type="number" id="pay" placeholder="實付">
            <button class="btn" onclick="submitOrder()">送出</button>
        </div>
    </div>

    <div class="card">
        <h3>未付款</h3>
        <table id="unpaidTable">
            <thead><tr><th>姓名</th><th>品項</th><th>應付</th><th>實收</th><th>管理</th></tr></thead>
            <tbody id="unpaidBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://test-order-system-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myId = localStorage.getItem('myDeviceId') || Math.random().toString(36).substr(2, 9);
    localStorage.setItem('myDeviceId', myId);

    const adminToggle = document.getElementById('adminToggle');
    adminToggle.checked = localStorage.getItem('isAdminMode') === 'true';
    document.getElementById('adminToolbar').style.display = adminToggle.checked ? 'flex' : 'none';

    adminToggle.addEventListener('change', (e) => {
        localStorage.setItem('isAdminMode', e.target.checked);
        document.getElementById('adminToolbar').style.display = e.target.checked ? 'flex' : 'none';
        db.ref('orders').once('value', s => renderTable(s.val()));
    });

    function uploadMenu(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 1200; canvas.height = img.height * (1200 / img.width);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    db.ref('config/menuImage').set(canvas.toDataURL('image/jpeg', 0.8));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    db.ref('config/menuImage').on('value', s => {
        const img = document.getElementById('menuImg'), wrap = document.getElementById('menuWrapper');
        if (s.val()) { img.src = s.val(); wrap.style.display = 'block'; }
    });

    db.ref('config/announcement').on('value', s => {
        const v = s.val() || { text: "收現金 / 收 LINE Pay", deadline: "未設定" };
        document.getElementById('announceText').innerText = "📢 " + v.text;
        document.getElementById('timeText').innerText = v.deadline;
    });

    function updateAnnouncement() {
        db.ref('config/announcement').update({ text: document.getElementById('annInput').value, deadline: document.getElementById('timeInput').value });
    }

    function submitOrder() {
        const n = document.getElementById('userName').value.trim(), i = document.getElementById('userItem').value.trim();
        const p = parseInt(document.getElementById('price').value)||0, y = parseInt(document.getElementById('pay').value)||0;
        if(!n || !i) return alert("填寫姓名與品項！");
        db.ref('orders').push({ name:n, item:i, price:p, pay:y, isPaid:false, owner:myId });
    }

    function renderTable(orders) {
        const b = document.getElementById('unpaidBody'); b.innerHTML = '';
        const isAdmin = adminToggle.checked;
        if(orders) {
            Object.keys(orders).forEach(id => {
                const o = orders[id];
                if(!o.isPaid) {
                    b.innerHTML += `<tr data-label="訂單">
                        <td data-label="姓名">${o.name}</td><td data-label="品項">${o.item}</td><td data-label="應付">${o.price}</td><td data-label="實收">${o.pay}</td>
                        <td data-label="管理">${isAdmin ? `<button class="btn" onclick="db.ref('orders/${id}/isPaid').set(true)">收</button> ` : ''} ${(o.owner === myId || isAdmin) ? `<button class="btn-del" onclick="db.ref('orders/${id}').remove()">刪除</button>` : '唯讀'}</td>
                    </tr>`;
                }
            });
        }
    }
    db.ref('orders').on('value', s => renderTable(s.val()));
    function clearOrders() { if(confirm("確定清空？")) db.ref('orders').remove(); }
</script>
</body>
</html>
