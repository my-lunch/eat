<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃什麼</title>
    
    <meta property="og:title" content="今天吃什麼">
    <meta property="og:description" content="點餐系統">
    <meta name="description" content="點餐系統">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://my-lunch.github.io/eat/">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary: #ff9f43; --danger: #e11d48; --success: #26de81; --bg: #f1f5f9; --dark: #1e293b; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: block; color: var(--dark); overflow-x: hidden; }
        
        .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        .page-title-section { text-align: center; margin-top: 10px; margin-bottom: 5px; }
        .page-title-section h1 { margin: 0; font-size: 32px; font-weight: 900; color: var(--dark); letter-spacing: 2px; }
        .page-title-section h2 { margin: 6px 0 0 0; font-size: 16px; font-weight: bold; color: #64748b; letter-spacing: 5px; }

        .admin-toolbar { display: none; flex-direction: row; flex-wrap: nowrap; background: var(--dark); padding: 12px 20px; border-radius: 12px; align-items: center; justify-content: center; margin-bottom: 10px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); gap: 12px; box-sizing: border-box; width: 100%; white-space: nowrap; overflow-x: auto; }
        .admin-toolbar input { padding: 8px 12px; border: 1px solid #444; background: #2d3748; color: white; border-radius: 6px; font-size: 14px; height: 36px; box-sizing: border-box; }
        .admin-toolbar input::placeholder { color: #a0aec0; }
        
        .ann-input { width: 150px; }
        .time-input { width: 110px; }
        .file-input { width: 180px; color: #cbd5e1; font-size: 13px; border: none !important; background: transparent !important; padding: 0 !important; cursor: pointer; }

        .admin-toolbar button { padding: 0 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; height: 36px; display: inline-flex; align-items: center; justify-content: center; box-sizing: border-box; white-space: nowrap; }
        .btn-sync { background: var(--primary); color: white; }
        .btn-stats { background: #a55eea; color: white; }
        .btn-clear { background: #747d8c; color: white; }

        .status-banner { background: white; padding: 20px 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .announcement-row { display: flex; justify-content: space-between; align-items: center; }
        .cash-info { font-size: 24px; font-weight: 800; color: var(--dark); } 
        
        .time-info-wrapper { display: flex; align-items: center; }
        .time-info { display: flex; align-items: baseline; color: var(--danger); background: #fff1f2; padding: 8px 20px; border-radius: 8px; white-space: nowrap; } 
        .time-label { font-size: 14px; font-weight: bold; }
        .time-value { font-size: 28px; font-weight: 900; margin: 0 5px; line-height: 1; }

        .admin-checkbox-secret { width: 15px; height: 15px; cursor: pointer; opacity: 0.15; margin-left: 10px; }
        .admin-checkbox-secret:hover { opacity: 0.8; }

        .menu-wrapper { width: 100%; display: none; text-align: center; }
        .menu-display { width: 100%; height: auto; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: block; }
        
        .dashboard { display: flex; gap: 20px; }
        .card { flex: 1; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .card h3 { margin: 0 0 10px; color: #64748b; font-size: 16px; font-weight: bold; }
        .card p { margin: 0; font-size: 36px; font-weight: 900; } 
        .text-red { color: var(--danger); }

        .form-section { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1.2fr 2fr 1fr 1fr 1fr 1.2fr; gap: 25px; align-items: end; } 
        .col-span-2 { grid-column: span 2; } 
        .form-group label { display: block; margin-bottom: 10px; font-weight: 900; font-size: 15px; color: var(--dark); }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; box-sizing: border-box; height: 48px; }
        
        .live-change-box { background: #f8fafc; border: 2px dashed #cbd5e1; padding: 0 10px; border-radius: 8px; text-align: center; font-size: 18px; font-weight: 900; color: var(--dark); height: 48px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; }
        .live-change-box.has-change { color: var(--danger); background: #fff1f2; border-color: var(--danger); }

        .table-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .table-container h3 { margin-top: 0; padding-bottom: 15px; border-bottom: 4px solid var(--bg); font-weight: 900; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th { text-align: left; background: #f8fafc; padding: 18px 24px; color: #64748b; font-weight: bold; border-bottom: 2px solid #e2e8f0; white-space: nowrap; }
        td { padding: 18px 24px; border-bottom: 1px solid #f1f5f9; font-size: 16px; white-space: nowrap; }
        
        th:nth-child(1), td:nth-child(1) { width: 10%; } 
        th:nth-child(2), td:nth-child(2) { width: 38%; white-space: normal; word-break: break-all; } 
        th:nth-child(3), td:nth-child(3) { width: 10%; } 
        th:nth-child(4), td:nth-child(4) { width: 10%; } 
        th:nth-child(5), td:nth-child(5) { width: 14%; } 
        th:nth-child(6), td:nth-child(6) { width: 18%; text-align: right; } 

        .action-btns { display: flex; gap: 8px; flex-wrap: nowrap; justify-content: flex-end; align-items: center; }
        .btn-confirm { background: var(--success); color: white; border: none; padding: 8px 14px; border-radius: 6px; font-weight: 900; cursor: pointer; white-space: nowrap; }
        .btn-edit { background: #4b5563; color: white; border: none; padding: 8px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .btn-save { background: #2563eb; color: white; border: none; padding: 8px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .btn-del { color: #cbd5e1; background: none; border: none; cursor: pointer; font-size: 16px; padding: 8px; border-radius: 6px; white-space: nowrap; }
        .btn-del:hover { background: #fee2e2; color: var(--danger); }
        .readonly-text { color: #94a3b8; font-size: 14px; font-weight: bold; padding: 8px; white-space: nowrap; }
        .inline-input { padding: 8px; border: 2px solid var(--primary); border-radius: 6px; font-size: 15px; width: 95%; box-sizing: border-box; font-weight: bold; }

        #statsModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 100px rgba(0,0,0,0.4); z-index: 100; min-width: 450px; max-width: 700px; width: 90%; box-sizing: border-box; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.8); z-index: 99; }
        .stats-header { font-size: 20px; font-weight: 900; color: var(--dark); margin-bottom: 15px; }
        .stats-total { font-size: 18px; font-weight: bold; color: #4b5563; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px dashed #cbd5e1; }
        .stats-list { max-height: 400px; overflow-y: auto; padding-right: 10px; }
        
        .stats-item { display: flex; justify-content: flex-start; align-items: center; padding: 12px 0; border-bottom: 1px dashed #e2e8f0; }
        .stats-item-left { font-weight: bold; font-size: 16px; color: var(--dark); margin-right: 12px; white-space: nowrap; }
        .stats-count { font-weight: 900; font-size: 16px; color: var(--dark); white-space: nowrap; }
        .stats-user-names { font-size: 13px; color: #94a3b8; margin-left: 40px; font-weight: normal; word-break: break-all; white-space: normal; } 

        /* 📱 手機版排版 */
        @media (max-width: 768px) {
            body { padding: 10px 0; }
            .container { padding: 0 10px; }
            .page-title-section h1 { font-size: 28px; }
            .page-title-section h2 { font-size: 14px; }

            .admin-toolbar { flex-direction: column; flex-wrap: wrap; padding: 20px 15px; margin: 0; white-space: normal; }
            .admin-toolbar input { width: 100% !important; box-sizing: border-box; }
            .admin-toolbar button { width: 100%; padding: 12px; font-size: 16px; }

            .announcement-row { flex-direction: column; gap: 12px; align-items: center; text-align: center; }
            .cash-info { font-size: 20px; }
            .time-info-wrapper { justify-content: center; width: 100%; }
            .time-info { padding: 6px 12px; }
            
            .dashboard { flex-direction: column; gap: 10px; }
            .form-grid { grid-template-columns: 1fr; gap: 15px; }
            .col-span-2 { grid-column: span 1; }
            
            table { table-layout: auto; }
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { margin-bottom: 15px; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
            td { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #f1f5f9; padding: 8px 0; min-width: 0 !important; width: 100% !important; text-align: right !important; }
            td:last-child { border-bottom: none; }
            td::before { content: attr(data-label); font-weight: 900; color: #64748b; float: left; }
            
            .stats-item { flex-direction: row; align-items: center; justify-content: flex-start; overflow-x: auto; width: 100%; white-space: nowrap; }
            .stats-user-names { margin-left: 20px; margin-top: 0; white-space: nowrap; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="page-title-section">
            <h1>今天吃什麼</h1>
            <h2>點餐系統</h2>
        </div>

        <div class="admin-toolbar" id="adminToolbar">
            <span style="font-weight:bold; color:var(--primary); font-size: 15px;">👑 團主控制：</span>
            <input type="text" id="annInput" class="ann-input" placeholder="修改收款公告...">
            <input type="text" id="timeInput" class="time-input" placeholder="時間(例如 11:00)">
            <button class="btn-sync" onclick="updateAnnouncement()">同步公告與時間</button>
            <span style="font-weight:bold; font-size:14px; color: #cbd5e1; margin-left: 5px;">上傳菜單：</span>
            <input type="file" accept="image/*" class="file-input" onchange="uploadMenu(this)">
            <button class="btn-stats" onclick="showStats()">📊 叫餐統計</button>
            <button class="btn-clear" onclick="clearOrders()">🧹 淨空訂單</button>
        </div>
        
        <div class="status-banner">
            <div class="announcement-row">
                <div id="announceText" class="cash-info">📢 收現金 / 收 LINE Pay</div>
                <div class="time-info-wrapper">
                    <div class="time-info">
                        <span class="time-label">截止</span>
                        <span id="timeText" class="time-value">未設定</span>
                    </div>
                    <input type="checkbox" id="adminToggle" class="admin-checkbox-secret" onclick="toggleAdminMode()" title="隱藏開關">
                </div>
            </div>
        </div>

        <div id="menuWrapper" class="menu-wrapper">
            <img id="menuImg" class="menu-display">
        </div>

        <div class="dashboard">
            <div class="card">
                <h3>總金額</h3>
                <p id="totalNeed">0</p>
            </div>
            <div class="card">
                <h3>已收現金</h3>
                <p id="totalGet">0</p>
            </div>
            <div class="card">
                <h3>剩餘待收</h3>
                <p id="totalPending" class="text-red">0</p>
            </div>
        </div>

        <div class="form-section">
            <h3 style="margin-top:0; border-bottom: 2px solid var(--bg); padding-bottom:10px;">📝 點餐</h3>
            <div class="form-grid">
                <div class="form-group"><label>姓名</label><input type="text" id="userName" placeholder="AMY"></div>
                <div class="form-group col-span-2"><label>品項</label><input type="text" id="userItem" placeholder="蒜香清炒-雞胸蛤蠣義大利麵"></div>
                <div class="form-group"><label>應付</label><input type="number" id="price" placeholder="100" oninput="calculateLiveChange()"></div>
                <div class="form-group"><label>實付</label><input type="number" id="pay" placeholder="0" oninput="calculateLiveChange()"></div>
                
                <div class="form-group">
                    <label>找零</label>
                    <div id="liveChangeDisplay" class="live-change-box">0</div>
                </div>

                <button class="btn-sync" style="height: 48px; width: 100%; border-radius: 8px; font-weight: 900;" onclick="submitOrder()">送出點餐</button>
            </div>
        </div>

        <div class="table-container">
            <h3 style="color:var(--danger)">📝 所有未付款區</h3>
            <table id="unpaidTable">
                <thead><tr><th>姓名</th><th>品項</th><th>應付</th><th>實收</th><th>找零狀態</th><th></th></tr></thead>
                <tbody id="unpaidBody"></tbody>
            </table>
        </div>

        <div class="table-container">
            <h3 style="color:var(--success)">✅ 所有已付款區</h3>
            <table id="paidTable">
                <thead><tr><th>姓名</th><th>品項</th><th>應付</th><th>實收</th><th>找零狀態</th><th></th></tr></thead>
                <tbody id="paidBody"></tbody>
            </table>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()"></div>
    <div id="statsModal">
        <div class="stats-header">📞 叫餐統計</div>
        <div id="statsTotal" class="stats-total">總計：0 份</div>
        <div id="statsContent" class="stats-list"></div>
        <button class="btn-sync" style="margin-top:20px; width:100%; padding: 12px; font-size: 16px;" onclick="closeModal()">關閉</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://test-order-system-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let myId = localStorage.getItem('myDeviceId') || Math.random().toString(36).substr(2, 9);
        localStorage.setItem('myDeviceId', myId);
        let editingId = null;

        window.addEventListener('load', () => {
            let isAdm = localStorage.getItem('isAdminMode') === 'true';
            document.getElementById('adminToggle').checked = isAdm;
            document.getElementById('adminToolbar').style.display = isAdm ? 'flex' : 'none';
        });

        function toggleAdminMode() {
            let isAdm = document.getElementById('adminToggle').checked;
            localStorage.setItem('isAdminMode', isAdm);
            document.getElementById('adminToolbar').style.display = isAdm ? 'flex' : 'none';
            database.ref('orders').once('value', s => renderTable(s.val()));
        }

        function calculateLiveChange() {
            const price = parseInt(document.getElementById('price').value) || 0;
            const pay = parseInt(document.getElementById('pay').value) || 0;
            const changeDisplay = document.getElementById('liveChangeDisplay');
            const diff = pay - price;
            if (diff > 0) {
                changeDisplay.innerText = "找零 " + diff;
                changeDisplay.classList.add('has-change');
            } else {
                changeDisplay.innerText = "0";
                changeDisplay.classList.remove('has-change');
            }
        }

        function uploadMenu(input) {
            if (input.files && input.files[0]) {
                alert("照片處理中，請稍候..."); 
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 1200; 
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) { height = Math.round(height *= MAX_WIDTH / width); width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                        
                        database.ref('config/menuImage').set(dataUrl)
                            .then(() => alert("菜單照片上傳成功！"))
                            .catch(err => alert("上傳失敗：" + err.message));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        database.ref('config/menuImage').on('value', (s) => {
            const img = document.getElementById('menuImg');
            const wrapper = document.getElementById('menuWrapper');
            if (s.val()) { 
                img.src = s.val(); 
                wrapper.style.display = 'block'; 
            } else {
                wrapper.style.display = 'none';
            }
        });

        database.ref('config/announcement').on('value', (s) => {
            const val = s.val() || { text: "收現金 / 收 LINE Pay", deadline: "未設定" };
            document.getElementById('announceText').innerText = "📢 " + val.text;
            document.getElementById('timeText').innerText = val.deadline;
        });
        
        function updateAnnouncement() {
            const text = document.getElementById('annInput').value.trim();
            const time = document.getElementById('timeInput').value.trim();
            const updates = {};
            if(text) updates.text = text;
            if(time) updates.deadline = time + " 截止";
            if(text || time) {
                database.ref('config/announcement').update(updates)
                    .then(() => alert("公告同步成功！"));
            }
            document.getElementById('annInput').value = ''; document.getElementById('timeInput').value = '';
        }

        function submitOrder() {
            const name = document.getElementById('userName').value.trim();
            const item = document.getElementById('userItem').value.trim();
            const price = parseInt(document.getElementById('price').value) || 0;
            const pay = parseInt(document.getElementById('pay').value) || 0;
            if(!name || !item) return alert("請填寫姓名與品項內容！");
            
            database.ref('orders').push({ name, item, price, pay, isPaid: false, owner: myId });
            
            document.getElementById('userName').value = ''; document.getElementById('userItem').value = '';
            document.getElementById('price').value = ''; document.getElementById('pay').value = '';
            calculateLiveChange();
        }
        
        function markPaid(id) { database.ref('orders').child(id).update({ isPaid: true }); }
        function startEdit(id) { editingId = id; database.ref('orders').once('value', (s) => renderTable(s.val())); }
        function cancelEdit() { editingId = null; database.ref('orders').once('value', (s) => renderTable(s.val())); }

        function saveEdit(id) {
            const elItem = document.getElementById(`editItem_${id}`);
            const elPrice = document.getElementById(`editPrice_${id}`);
            const elPay = document.getElementById(`editPay_${id}`);
            if (!elItem) return;
            editingId = null;
            database.ref('orders').child(id).update({
                item: elItem.value.trim(),
                price: parseInt(elPrice.value) || 0,
                pay: parseInt(elPay.value) || 0
            });
        }

        function renderTable(orders) {
            const unpaidBody = document.getElementById('unpaidBody');
            const paidBody = document.getElementById('paidBody');
            unpaidBody.innerHTML = paidBody.innerHTML = '';
            let tNeed = 0, tGet = 0;
            let isAdminMode = document.getElementById('adminToggle').checked;

            if (orders) {
                Object.keys(orders).forEach(id => {
                    const o = orders[id];
                    tNeed += o.price;
                    const isEditing = (editingId === id);
                    const changeAmt = o.pay - o.price;
                    const safeItem = o.item.replace(/"/g, '&quot;');
                    
                    const isOwner = (o.owner === myId);
                    const canEdit = isOwner || isAdminMode;
                    const changeText = changeAmt > 0 ? `<span style="color:var(--danger); font-weight:900;">找零 $${changeAmt}</span>` : `<span style="color:#747d8c; font-weight:bold;">$0</span>`;

                    if (o.isPaid) {
                        tGet += o.pay;
                        if (isEditing) {
                            paidBody.innerHTML += `<tr>
                                <td data-label="姓名"><strong>${o.name}</strong></td>
                                <td data-label="品項"><input type="text" id="editItem_${id}" class="inline-input" value="${safeItem}"></td>
                                <td data-label="應付"><input type="number" id="editPrice_${id}" class="inline-input" value="${o.price}" style="width:60px"></td>
                                <td data-label="實收"><input type="number" id="editPay_${id}" class="inline-input" value="${o.pay}" style="width:60px"></td>
                                <td data-label="找零狀態">編輯中</td>
                                <td data-label="">
                                    <div class="action-btns">
                                        <button class="btn-save" onclick="saveEdit('${id}')">💾 儲存</button>
                                        <button class="btn-del" onclick="cancelEdit()">取消</button>
                                    </div>
                                </td>
                            </tr>`;
                        } else {
                            let btnHtml = canEdit ? `<button class="btn-edit" onclick="startEdit('${id}')">✏️ 修改</button> <button class="btn-del" onclick="deleteOrder('${id}')">❌</button>` : `<span class="readonly-text">🔒 唯讀</span>`;
                            
                            paidBody.innerHTML += `<tr>
                                <td data-label="姓名"><strong>${o.name}</strong></td>
                                <td data-label="品項" style="color:#475569">${o.item}</td>
                                <td data-label="應付">$${o.price}</td>
                                <td data-label="實收" style="color:var(--success); font-weight:900;">$${o.pay}</td>
                                <td data-label="找零狀態">${changeText}</td>
                                <td data-label=""><div class="action-btns">${btnHtml}</div></td>
                            </tr>`;
                        }
                    } else {
                        if (isEditing) {
                            unpaidBody.innerHTML += `<tr>
                                <td data-label="姓名"><strong>${o.name}</strong></td>
                                <td data-label="品項"><input type="text" id="editItem_${id}" class="inline-input" value="${safeItem}"></td>
                                <td data-label="應付"><input type="number" id="editPrice_${id}" class="inline-input" value="${o.price}" style="width:60px"></td>
                                <td data-label="實收"><input type="number" id="editPay_${id}" class="inline-input" value="${o.pay}" style="width:60px"></td>
                                <td data-label="找零狀態">編輯中</td>
                                <td data-label="">
                                    <div class="action-btns">
                                        <button class="btn-save" onclick="saveEdit('${id}')">💾 儲存</button>
                                        <button class="btn-del" onclick="cancelEdit()">取消</button>
                                    </div>
                                </td>
                            </tr>`;
                        } else {
                            let btnHtml = '';
                            if (isAdminMode) btnHtml += `<button class="btn-confirm" onclick="markPaid('${id}')">✓ 收款</button> `;
                            if (canEdit) {
                                btnHtml += `<button class="btn-edit" onclick="startEdit('${id}')">✏️ 修改</button> <button class="btn-del" onclick="deleteOrder('${id}')">❌</button>`;
                            } else {
                                btnHtml += `<span class="readonly-text">🔒 唯讀</span>`;
                            }

                            unpaidBody.innerHTML += `<tr>
                                <td data-label="姓名"><strong>${o.name}</strong></td>
                                <td data-label="品項" style="color:#475569">${o.item}</td>
                                <td data-label="應付">$${o.price}</td>
                                <td data-label="實收" style="color:#94a3b8">$${o.pay}</td>
                                <td data-label="找零狀態">${changeText}</td>
                                <td data-label=""><div class="action-btns">${btnHtml}</div></td>
                            </tr>`;
                        }
                    }
                });
            }
            
            document.getElementById('totalNeed').innerText = tNeed;
            document.getElementById('totalGet').innerText = tGet;
            document.getElementById('totalPending').innerText = Math.max(0, tNeed - tGet);
        }

        database.ref('orders').on('value', (snapshot) => renderTable(snapshot.val()));

        /* 👑 真正修正的地方：把 split 括號裡面的「/」徹底移除了！ */
        function showStats() {
            database.ref('orders').once('value', (s) => {
                const orders = s.val(); 
                const stats = {}; let total = 0; 
                if(orders) {
                    Object.values(orders).forEach(o => { 
                        // 這裡已經徹底拿掉斜線，遇到斜線不會再被拆開了！
                        o.item.split(/[+＋,，、]/).forEach(singleItem => {
                            const name = singleItem.trim();
                            if(name) { 
                                if (!stats[name]) {
                                    stats[name] = { count: 0, users: [] };
                                }
                                stats[name].count++;
                                if (!stats[name].users.includes(o.name)) {
                                    stats[name].users.push(o.name);
                                }
                                total++; 
                            }
                        });
                    }); 
                }
                document.getElementById('statsTotal').innerText = `總計：${total} 份`;
                document.getElementById('statsContent').innerHTML = Object.entries(stats).map(([k,v]) => `
                    <div class="stats-item">
                        <div class="stats-item-left">🍱 ${k}</div>
                        <span class="stats-count">× ${v.count}</span>
                        <span class="stats-user-names">${v.users.join('、')}</span>
                    </div>
                `).join('');
                document.getElementById('statsModal').style.display = 'block'; 
                document.getElementById('modalOverlay').style.display = 'block';
            });
        }

        function closeModal() { document.getElementById('statsModal').style.display = 'none'; document.getElementById('modalOverlay').style.display = 'none'; }
        function deleteOrder(id) { if(confirm("確定刪除？")) database.ref('orders').child(id).remove(); }
        function clearOrders() { if(confirm("確定清空所有數據？")) database.ref('orders').remove(); }
    </script>
</body>
</html>
