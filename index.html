<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃什麼</title>
    <meta name="description" content="辦公室揪團點餐系統，趕快來送出你的餐點吧！">
    <meta property="og:title" content="👑 今天吃什麼 - 點餐系統">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary: #ff9f43; --danger: #e11d48; --success: #26de81; --bg: #f1f5f9; --dark: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); overflow-x: hidden; }
        .admin-toolbar { display: none; background: var(--dark); padding: 15px; border-radius: 12px; margin-bottom: 20px; color: white; flex-wrap: wrap; gap: 10px; }
        .container { max-width: 1000px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        .status-banner { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .announcement-row { display: flex; justify-content: space-between; align-items: center; }
        .menu-wrapper { width: 100%; display: none; margin-top: 15px; }
        .menu-display { width: 100%; height: auto; border-radius: 12px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .btn { padding: 10px; border: none; border-radius: 6px; background: var(--primary); color: white; cursor: pointer; }
        .btn-del { color: var(--danger); background: none; border: none; cursor: pointer; }
        .admin-checkbox-secret { opacity: 0.1; margin-left: 10px; }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { border: 1px solid #eee; margin-bottom: 10px; padding: 10px; border-radius: 8px; background: white; }
            td { display: flex; justify-content: space-between; }
            td::before { content: attr(data-label); font-weight: bold; color: #64748b; }
        }
    </style>
</head>
<body>

<div class="admin-toolbar" id="adminToolbar">
    <input type="text" id="annInput" placeholder="公告...">
    <input type="text" id="timeInput" placeholder="時間...">
    <button class="btn" onclick="updateAnnouncement()">同步</button>
    <input type="file" accept="image/*" onchange="uploadMenu(this)">
    <button class="btn" onclick="clearOrders()">清空</button>
</div>

<div class="container">
    <div class="status-banner">
        <div class="announcement-row">
            <div style="display:flex; align-items:center;">
                <div id="announceText" style="font-weight:bold; font-size:20px;">📢 收現金 / 收 LINE Pay</div>
                <input type="checkbox" id="adminToggle" class="admin-checkbox-secret">
            </div>
            <div style="font-weight:bold; color:red; font-size:18px;">截止時間：<span id="timeText" style="font-size:32px;">未設定</span></div>
        </div>
    </div>

    <div id="menuWrapper" class="menu-wrapper"><img id="menuImg" class="menu-display"></div>

    <div class="card">
        <h3>📝 點餐</h3>
