<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>午餐吃什麼</title>
    
    <meta property="og:title" content="午餐吃什麼">
    <meta property="og:description" content="點餐系統">
    <meta name="description" content="點餐系統">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://my-lunch.github.io/eat/">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary: #ff9f43; --danger: #e11d48; --success: #26de81; --bg: #f1f5f9; --dark: #1e293b; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: block; color: var(--dark); overflow-x: hidden; }
        
        .container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        .page-title-section { text-align: center; margin-top: 10px; margin-bottom: 5px; }
        .page-title-section h1 { margin: 0; font-size: 32px; font-weight: 900; color: var(--dark); letter-spacing: 2px; }
        .page-title-section h2 { margin: 6px 0 0 0; font-size: 16px; font-weight: bold; color: #64748b; letter-spacing: 5px; }

        .admin-toolbar { display: none; flex-direction: row; flex-wrap: nowrap; background: var(--dark); padding: 12px 20px; border-radius: 12px; align-items: center; justify-content: center; margin-bottom: 10px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); gap: 12px; box-sizing: border-box; width: 100%; white-space: nowrap; overflow-x: auto; }
        .admin-toolbar input { padding: 8px 12px; border: 1px solid #444; background: #2d3748; color: white; border-radius: 6px; font-size: 14px; height: 36px; box-sizing: border-box; }
        .admin-toolbar input::placeholder { color: #a0aec0; }
        
        .ann-input { width: 150px; }
        .time-input { width: 110px; }
        .file-input { width: 180px; color: #cbd5e1; font-size: 13px; border: none !important; background: transparent !important; padding: 0 !important; cursor: pointer; }

        .admin-toolbar button { padding: 0 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; height: 36px; display: inline-flex; align-items: center; justify-content: center; box-sizing: border-box; white-space: nowrap; }
        .btn-sync { background: var(--primary); color: white; }
        .btn-stats { background: #a55eea; color: white; }
        .btn-clear { background: #747d8c; color: white; }

        .status-banner { background: white; padding: 20px 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .announcement-row { display: flex; justify-content: space-between; align-items: center; }
        .cash-info { font-size: 24px; font-weight: 800; color: var(--dark); } 
        
        .time-info-wrapper { display: flex; align-items: center; }
        .time-info { display: flex; align-items: baseline; color: var(--danger); background: #fff1f2; padding: 8px 20px; border-radius: 8px; white-space: nowrap; } 
        .time-label { font-size: 14px; font-weight: bold; }
        .time-value { font-size: 28px; font-weight: 900; margin: 0 5px; line-height: 1; }

        .admin-checkbox-secret { width: 15px; height: 15px; cursor: pointer; opacity: 0.15; margin-left: 10px; }
        .admin-checkbox-secret:hover { opacity: 0.8; }

        .menu-wrapper { width: 100%; display: none; text-align: center; }
        .menu-display { width: 100%; height: auto; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: block; }
        
        .dashboard { display: flex; gap: 20px; }
        .card { flex: 1; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .card h3 { margin: 0 0 10px; color: #64748b; font-size: 16px; font-weight: bold; }
        .card p { margin: 0; font-size: 36px; font-weight: 900; } 
        .text-red { color: var(--danger); }

        .form-section { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .form-box { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; box-sizing: border-box; height: 48px; text-align: left; }
        .mobile-only-label { display: none; }

        .table-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .table-container h3 { margin-top: 0; padding-bottom: 15px; border-bottom: 4px solid var(--bg); font-weight: 900; }
        
        .desktop-labels { display: flex; width: 100%; margin-bottom: 10px; font-weight: bold; font-size: 15px; color: #64748b; text-align: left; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th { text-align: left; background: #f8fafc; padding: 15px 10px 15px 0; color: #64748b; font-weight: bold; font-size: 15px; border-bottom: 2px solid #e2e8f0; white-space: nowrap; box-sizing: border-box; }
        
        td { padding: 15px 10px 15px 0; border-bottom: 1px solid #f1f5f9; font-size: 16px; white-space: nowrap; box-sizing: border-box; text-align: left; }
        
        th:first-child, td:first-child { padding-left: 0; }
        th:last-child, td:last-child { padding-right: 0; }
        
        th:nth-child(1), td:nth-child(1) { width: 12%; padding-right: 15px; } 
        th:nth-child(2), td:nth-child(2) { width: 44%; padding-right: 25px; white-space: normal; word-break: break-all; } 
        th:nth-child(3), td:nth-child(3) { width: 13%; } 
        th:nth-child(4), td:nth-child(4) { width: 13%; } 
        th:nth-child(5), td:nth-child(5) { width: 8%; } 
        th:nth-child(6), td:nth-child(6) { width: 10%; text-align: right; } 

        .action-btns { display: flex; gap: 4px; flex-wrap: nowrap; justify-content: flex-end; align-items: center; }
        
        .btn-confirm { background: var(--success); color: white; border: none; padding: 4px 8px; border-radius: 6px; font-weight: 900; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .btn-change-done { background: #45aaf2; color: white; border: none; padding: 4px 8px; border-radius: 6px; font-weight: 900; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .btn-edit { background: #4b5563; color: white; border: none; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .btn-save { background: #2563eb; color: white; border: none; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; white-space: nowrap; }
        
        .btn-del { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 10px; padding: 2px 4px; font-weight: 900; border-radius: 4px; white-space: nowrap; }
        .btn-del:hover { background: #fee2e2; }
        
        .readonly-text { color: #94a3b8; font-size: 18px; font-weight: bold; padding: 8px; white-space: nowrap; }
        
        .status-icon-only { font-size: 16px; font-weight: 900; }
        
        .inline-input { padding: 8px; border: 2px solid var(--primary); border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; font-weight: bold; text-align: left; }

        #statsModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 100px rgba(0,0,0,0.4); z-index: 100; min-width: 450px; max-width: 700px; width: 90%; box-sizing: border-box; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.8); z-index: 99; }
        .stats-header { font-size: 20px; font-weight: 900; color: var(--dark); margin-bottom: 15px; }
        .stats-total { font-size: 18px; font-weight: bold; color: #4b5563; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px dashed #cbd5e1; }
        .stats-list { max-height: 650px; overflow-y: auto; padding-right: 10px; }
        
        .stats-item { display: flex; justify-content: flex-start; align-items: center; padding: 5px 0; border-bottom: 1px dashed #e2e8f0; }
        .stats-item-left { font-weight: bold; font-size: 16px; color: var(--dark); margin-right: 12px; white-space: nowrap; }
        .stats-count { font-weight: 900; font-size: 16px; color: var(--dark); white-space: nowrap; }
        .stats-user-names { font-size: 13px; color: #94a3b8; margin-left: 40px; font-weight: normal; word-break: break-all; white-space: normal; } 

        .page-footer { text-align: center; color: #94a3b8; font-size: 13px; font-weight: bold; padding: 15px 0 30px 0; margin-top: 10px; letter-spacing: 1px; }

        /* 📱 手機版 RWD 防護排版 */
        @media (max-width: 768px) {
            body { padding: 10px 0; }
            .container { padding: 0 10px; }
            .page-footer { order: 100; }
            .admin-toolbar { flex-direction: column; flex-wrap: wrap; padding: 20px 15px; margin: 0; white-space: normal; }
            .admin-toolbar input { width: 100% !important; box-sizing: border-box; }
            .admin-toolbar button { width: 100%; padding: 12px; font-size: 16px; }
            .announcement-row { flex-direction: column; gap: 12px; align-items: center; text-align: center; }
            .cash-info { font-size: 20px; }
            .time-info-wrapper { justify-content: center; width: 100%; }
            .time-info { padding: 6px 12px; }
            .dashboard { flex-direction: column; gap: 10px; }
            
            .desktop-labels { display: none !important; }
            .mobile-only-label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 15px; color: #64748b; text-align: left; }
            .form-inputs { flex-direction: column; gap: 15px; }
            .form-inputs > div { width: 100% !important; padding-right: 0 !important; }
            
            .table-container { overflow-x: auto; padding: 20px 15px; }
            table { table-layout: fixed; width: 650px; } 
            th, td { padding: 10px 4px; font-size: 13px; }
            .action-btns button { padding: 5px 6px; font-size: 11px; }
            .inline-input { padding: 4px; font-size: 12px; }
            .status-icon-only { font-size: 12px !important; }
            .stats-item { flex-direction: row; align-items: center; justify-content: flex-start; overflow-x: auto; width: 100%; white-space: nowrap; padding: 5px 0; }
            .stats-user-names { margin-left: 20px; margin-top: 0; white-space: nowrap; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="page-title-section">
            <h1>午餐吃什麼</h1>
            <h2>點餐系統</h2>
        </div>

        <div class="admin-toolbar" id="adminToolbar">
            <span style="font-weight:bold; color:var(--primary); font-size: 15px;">👑 團主：</span>
            <input type="text" id="annInput" class="ann-input" placeholder="修改公告...">
            <input type="text" id="timeInput" class="time-input" placeholder="時間(例11:00)">
            <button class="btn-sync" onclick="updateAnnouncement()">同步</button>
            <span style="font-weight:bold; font-size:14px; color: #cbd5e1; margin-left: 5px;">上傳菜單：</span>
            <input type="file" accept="image/*" class="file-input" onchange="uploadMenu(this)">
            <button class="btn-stats" onclick="showStats()">📊 統計</button>
            <button class="btn-sync" style="background:#747d8c;" onclick="clearOrders()">🧹 淨空訂單</button>
        </div>
        
        <div class="status-banner">
            <div class="announcement-row">
                <div id="announceText" class="cash-info">📢 收現金 / 收 LINE Pay</div>
                <div class="time-info-wrapper">
                    <div class="time-info">
                        <span class="time-label">截止時間</span>
                        <span id="timeText" class="time-value">未設定</span>
                    </div>
                    <input type="checkbox" id="adminToggle" class="admin-checkbox-secret" onclick="toggleAdminMode()" title="隱藏開關">
                </div>
            </div>
        </div>

        <div id="menuWrapper" class="menu-wrapper">
            <img id="menuImg" class="menu-display">
        </div>

        <div class="form-section">
            <h3 style="margin-top:0; border-bottom: 2px solid var(--bg); padding-bottom:10px;">📝 點餐</h3>
            
            <div class="desktop-labels">
                <div style="width: 12%; padding-right: 15px; box-sizing: border-box;">姓名</div>
                <div style="width: 44%; padding-right: 25px; box-sizing: border-box;">品項</div>
                <div style="width: 13%; padding-right: 15px; box-sizing: border-box;">應付</div>
                <div style="width: 13%; padding-right: 15px; box-sizing: border-box;">實付</div>
                <div style="width: 18%;"></div> 
            </div>
            
            <div class="form-inputs" style="display: flex; width: 100%; align-items: center;">
                <div style="width: 12%; padding-right: 15px; box-sizing: border-box;">
                    <label class="mobile-only-label">姓名</label>
                    <input type="text" id="userName" placeholder="AMY" class="form-box">
                </div>
                <div style="width: 44%; padding-right: 25px; box-sizing: border-box;">
                    <label class="mobile-only-label">品項</label>
                    <input type="text" id="userItem" placeholder="蒜香清炒-雞胸蛤蠣義大利麵" class="form-box">
                </div>
                <div style="width: 13%; padding-right: 15px; box-sizing: border-box;">
                    <label class="mobile-only-label">應付</label>
                    <input type="number" id="price" placeholder="100" class="form-box">
                </div>
                <div style="width: 13%; padding-right: 15px; box-sizing: border-box;">
                    <label class="mobile-only-label">實付</label>
                    <input type="number" id="pay" placeholder="100" class="form-box">
                </div>
                <div style="width: 18%; display: flex; justify-content: flex-end; box-sizing: border-box;">
                    <button class="btn-sync" style="height: 48px; width: 100%; max-width: 120px; border-radius: 8px; font-weight: 900;" onclick="submitOrder()">送出點餐</button>
                </div>
            </div>
        </div>

        <div class="table-container">
            <h3 style="color:var(--danger)">📝 所有未付款區</h3>
            <table id="unpaidTable">
                <thead><tr><th>姓名</th><th>品項</th><th>應付</th><th>實收</th><th>找零</th><th></th></tr></thead>
                <tbody id="unpaidBody"></tbody>
            </table>
        </div>

        <div class="table-container">
            <h3 style="color:var(--success)">✅ 所有已付款區</h3>
            <table id="paidTable">
                <thead><tr><th>姓名</th><th>品項</th><th>應付</th><th>實收</th><th>找零</th><th></th></tr></thead>
                <tbody id="paidBody"></tbody>
            </table>
        </div>

        <div class="dashboard">
            <div class="card" style="flex: 3;">
                <h3>總金額</h3>
                <p id="totalNeed" class="text-red">0</p>
            </div>
            <div class="card" style="flex: 1;">
                <h3>已收現金</h3>
                <p id="totalGet">0</p>
            </div>
            <div class="card" style="flex: 1;">
                <h3>未付款金額</h3>
                <p id="totalUnpaid">0</p>
            </div>
        </div>

        <footer class="page-footer">
            今天也要好好吃飯 🍜 Have a nice lunch
        </footer>
    </div>

    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()"></div>
    <div id="statsModal">
        <div class="stats-header">📞 叫餐統計</div>
        <div id="statsTotal" class="stats-total">總計：0 份</div>
        <div id="statsContent" class="stats-list"></div>
        <button class="btn-sync" style="margin-top:20px; width:100%; padding: 12px; font-size: 16px;" onclick="closeModal()">關閉</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://test-order-system-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let myId = localStorage.getItem('myDeviceId') || Math.random().toString(36).substr(2, 9);
        localStorage.setItem('myDeviceId', myId);
        let editingId = null;

        window.addEventListener('load', () => {
            let isAdm = localStorage.getItem('isAdminMode') === 'true';
            document.getElementById('adminToggle').checked = isAdm;
            document.getElementById('adminToolbar').style.display = isAdm ? 'flex' : 'none';
        });

        function toggleAdminMode() {
            let isAdm = document.getElementById('adminToggle').checked;
            localStorage.setItem('isAdminMode', isAdm);
            document.getElementById('adminToolbar').style.display = isAdm ? 'flex' : 'none';
            database.ref('orders').once('value', s => renderTable(s.val()));
        }

        function uploadMenu(input) {
            if (input.files && input.files[0]) {
                alert("照片處理中，請稍候..."); 
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        const MAX_WIDTH = 1000; 
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) { height = Math.round(height *= MAX_WIDTH / width); width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                        
                        database.ref('config/menuImage').set(dataUrl)
                            .then(() => alert("菜單照片上傳成功！"))
                            .catch(err => alert("上傳失敗：" + err.message));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        database.ref('config/menuImage').on('value', (s) => {
            const img = document.getElementById('menuImg');
            const wrapper = document.getElementById('menuWrapper');
            if (s.val()) { 
                img.src = s.val(); 
                wrapper.style.display = 'block'; 
            } else {
                wrapper.style.display = 'none';
            }
        });

        database.ref('config/announcement').on('value', (s) => {
            const val = s.val() || { text: "收現金 / 收 LINE Pay", deadline: "未設定" };
            document.getElementById('announceText').innerText = "📢 " + val.text;
            document.getElementById('timeText').innerText = val.deadline;
        });
        
        function updateAnnouncement() {
            const text = document.getElementById('annInput').value.trim();
            const time = document.getElementById('timeInput').value.trim();
            const updates = {};
            if(text) updates.text = text;
            if(time) updates.deadline = time + " 截止";
            if(text || time) {
                database.ref('config/announcement').update(updates)
                    .then(() => alert("公告同步成功！"));
            }
            document.getElementById('annInput').value = ''; document.getElementById('timeInput').value = '';
        }

        function submitOrder() {
            const name = document.getElementById('userName').value.trim();
            const item = document.getElementById('userItem').value.trim();
            const price = parseInt(document.getElementById('price').value) || 0;
            const payInput = document.getElementById('pay').value.trim();
            
            const pay = payInput === '' ? price : (parseInt(payInput) || 0);
            
            if(!name || !item) return alert("請填寫姓名與品項內容！");
            
            database.ref('orders').push({ name, item, price, pay, isPaid: false, changeSettled: false, owner: myId });
            
            document.getElementById('userName').value = ''; 
            document.getElementById('userItem').value = '';
            document.getElementById('price').value = ''; 
            document.getElementById('pay').value = '';
        }
        
        function markPaid(id) { database.ref('orders').child(id).update({ isPaid: true }); }
        
        function settleChange(id) { database.ref('orders').child(id).update({ changeSettled: true }); }
        
        function startEdit(id) { editingId = id; database.ref('orders').once('value', (s) => renderTable(s.val())); }
        function cancelEdit() { editingId = null; database.ref('orders').once('value', (s) => renderTable(s.val())); }

        function saveEdit(id) {
            const elItem = document.getElementById(`editItem_${id}`);
            const elPrice = document.getElementById(`editPrice_${id}`);
            const elPay = document.getElementById(`editPay_${id}`);
            if (!elItem) return;
            editingId = null;
            database.ref('orders').child(id).update({
                item: elItem.value.trim(),
                price: parseInt(elPrice.value) || 0,
                pay: parseInt(elPay.value) || 0
            });
        }

        function renderTable(orders) {
            const unpaidBody = document.getElementById('unpaidBody');
            const paidBody = document.getElementById('paidBody');
            unpaidBody.innerHTML = paidBody.innerHTML = '';
            
            let tNeed = 0, tGet = 0, tUnpaid = 0;
            let isAdminMode = document.getElementById('adminToggle').checked;

            if (orders) {
                Object.keys(orders).forEach(id => {
                    const o = orders[id];
                    tNeed += o.price;
                    
                    const isEditing = (editingId === id);
                    const changeAmt = o.pay - o.price;
                    const safeItem = o.item.replace(/"/g, '&quot;');
                    
                    const isOwner = (o.owner === myId);
                    const canEdit = isOwner || isAdminMode;
                    const changeText = changeAmt > 0 ? `<span style="color:var(--danger); font-weight:900;">找 ${changeAmt}</span>` : `<span style="color:#747d8c; font-weight:bold;">0</span>`;

                    if (o.isPaid) {
                        if (changeAmt <= 0 || o.changeSettled) {
                            tGet += o.price;
                        } else {
                            tGet += o.pay;
                        }

                        if (isEditing) {
                            paidBody.innerHTML += `<tr>
                                <td><strong>${o.name}</strong></td>
                                <td><input type="text" id="editItem_${id}" class="inline-input" value="${safeItem}"></td>
                                <td><input type="number" id="editPrice_${id}" class="inline-input" value="${o.price}" style="width:100%"></td>
                                <td><input type="number" id="editPay_${id}" class="inline-input" value="${o.pay}" style="width:100%"></td>
                                <td>編輯中</td>
                                <td>
                                    <div class="action-btns">
                                        <button class="btn-save" onclick="saveEdit('${id}')">💾</button>
                                        <button class="btn-del" onclick="cancelEdit()">❌</button>
                                    </div>
                                </td>
                            </tr>`;
                        } else {
                            let btnHtml = canEdit ? `<button class="btn-edit" onclick="startEdit('${id}')">修改</button> <button class="btn-del" onclick="deleteOrder('${id}')">❌</button>` : `<span class="status-icon-only">🔒</span>`;
                            
                            let changeStatusHtml = '';
                            if (changeAmt <= 0) {
                                changeStatusHtml = `<span style="color:var(--success);" class="status-icon-only">✓</span>`;
                            } else {
                                const toggleStatus = !o.changeSettled;
                                const toggleFn = `database.ref('orders').child('${id}').update({changeSettled: ${toggleStatus}})` ;
                                if (o.changeSettled) {
                                    changeStatusHtml = `<span style="color:var(--success); cursor:pointer;" onclick="${toggleFn}" class="status-icon-only">✓</span>`;
                                } else {
                                    changeStatusHtml = isAdminMode ? 
                                        `<button class="btn-change-done" onclick="${toggleFn}">找 ${changeAmt}</button>` : 
                                        `<span style="color:var(--danger); font-weight:900;">找 ${changeAmt}</span>`;
                                }
                            }

                            paidBody.innerHTML += `<tr>
                                <td><strong>${o.name}</strong></td>
                                <td style="color:#475569">${o.item}</td>
                                <td>${o.price}</td>
                                <td style="color:var(--success); font-weight:900;">${o.pay}</td>
                                <td>${changeStatusHtml}</td>
                                <td><div class="action-btns">${btnHtml}</div></td>
                            </tr>`;
                        }
                    } else {
                        tUnpaid += o.price;

                        if (isEditing) {
                            unpaidBody.innerHTML += `<tr>
                                <td><strong>${o.name}</strong></td>
                                <td><input type="text" id="editItem_${id}" class="inline-input" value="${safeItem}"></td>
                                <td><input type="number" id="editPrice_${id}" class="inline-input" value="${o.price}" style="width:100%"></td>
                                <td><input type="number" id="editPay_${id}" class="inline-input" value="${o.pay}" style="width:100%"></td>
                                <td>編輯中</td>
                                <td>
                                    <div class="action-btns">
                                        <button class="btn-save" onclick="saveEdit('${id}')">💾</button>
                                        <button class="btn-del" onclick="cancelEdit()">❌</button>
                                    </div>
                                </td>
                            </tr>`;
                        } else {
                            let btnHtml = '';
                            if (isAdminMode) btnHtml += `<button class="btn-confirm" onclick="markPaid('${id}')">收款</button> `;
                            if (canEdit) {
                                btnHtml += `<button class="btn-edit" onclick="startEdit('${id}')">修改</button> <button class="btn-del" onclick="deleteOrder('${id}')">❌</button>`;
                            } else {
                                btnHtml += `<span class="status-icon-only">🔒</span>`;
                            }

                            unpaidBody.innerHTML += `<tr>
                                <td><strong>${o.name}</strong></td>
                                <td style="color:#475569">${o.item}</td>
                                <td>${o.price}</td>
                                <td style="color:#94a3b8">${o.pay}</td>
                                <td>${changeText}</td>
                                <td><div class="action-btns">${btnHtml}</div></td>
                            </tr>`;
                        }
                    }
                });
            }
            
            document.getElementById('totalNeed').innerText = tNeed;
            document.getElementById('totalGet').innerText = tGet;
            document.getElementById('totalUnpaid').innerText = tUnpaid; 
        }

        database.ref('orders').on('value', (snapshot) => renderTable(snapshot.val()));

        // 👇 針對叫餐統計清單，加入 AI 關鍵字分類與筆畫排序引擎
        function getCategoryWeight(name) {
            // 權重 1: 主食類 (排在最上方)
            if (/(堡|麵|飯|冬粉|粄條|米粉|水餃|鍋貼|吐司|套餐|披薩|餐|粥|餃|烏龍|雞腿|排骨|爌肉)/.test(name)) return 1;
            // 權重 3: 飲品類 (排在最下方)
            if (/(茶|奶|咖啡|拿鐵|可樂|雪碧|果汁|冰|飲|豆漿|水|汽水)/.test(name)) return 3;
            // 權重 2: 其餘視為單點配餐 (排在中間)
            return 2;
        }

        function showStats() {
            database.ref('orders').once('value', (s) => {
                const orders = s.val(); 
                const stats = {}; let total = 0; 
                
                if(orders) {
                    let orderList = Object.values(orders);
                    let processedItems = [];

                    for(let i = 0; i < orderList.length; i++) {
                        let currentItem = orderList[i].item.trim();
                        let currentName = orderList[i].name;

                        let hasLeft = (currentItem.includes('(') || currentItem.includes('（'));
                        let hasRight = (currentItem.includes(')') || currentItem.includes('）'));

                        if (hasLeft && !hasRight && i + 1 < orderList.length && orderList[i+1].name === currentName) {
                            currentItem = currentItem + "、" + orderList[i+1].item.trim();
                            i++; 
                        }
                        
                        processedItems.push({ name: currentName, item: currentItem });
                    }

                    processedItems.forEach(o => { 
                        o.item.split(/[+＋]/).forEach(singleItem => {
                            const name = singleItem.trim();
                            if(name) { 
                                if (!stats[name]) {
                                    stats[name] = { count: 0, users: [] };
                                }
                                stats[name].count++;
                                if (!stats[name].users.includes(o.name)) {
                                    stats[name].users.push(o.name);
                                }
                                total++; 
                            }
                        });
                    }); 
                }
                
                document.getElementById('statsTotal').innerText = `總計：${total} 份`;
                
                // 👇 使用自訂邏輯進行排序
                const sortedStats = Object.entries(stats).sort((a, b) => {
                    const weightA = getCategoryWeight(a[0]);
                    const weightB = getCategoryWeight(b[0]);
                    
                    // 1. 先比較分類權重 (主食 -> 單點 -> 飲品)
                    if (weightA !== weightB) {
                        return weightA - weightB;
                    }
                    
                    // 2. 權重相同時，優先比字數長度 (長的放上面，通常字多代表口味修飾詞較多)
                    if (b[0].length !== a[0].length) {
                        return b[0].length - a[0].length;
                    }
                    
                    // 3. 字數也相同時，比較筆畫與編碼反向排列 (筆畫多的放上面)
                    return b[0].localeCompare(a[0], 'zh-TW');
                });
                
                document.getElementById('statsContent').innerHTML = sortedStats.map(([k,v]) => `
                    <div class="stats-item">
                        <div class="stats-item-left">🍱 ${k}</div>
                        <span class="stats-count">× ${v.count}</span>
                        <span class="stats-user-names">${v.users.join('、')}</span>
                    </div>
                `).join('');
                document.getElementById('statsModal').style.display = 'block'; 
                document.getElementById('modalOverlay').style.display = 'block';
            });
        }

        function closeModal() { document.getElementById('statsModal').style.display = 'none'; document.getElementById('modalOverlay').style.display = 'none'; }
        function deleteOrder(id) { if(confirm("確定刪除？")) database.ref('orders').child(id).remove(); }
        function clearOrders() { if(confirm("確定清空所有數據？")) database.ref('orders').remove(); }
    </script>
