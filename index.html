<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>午餐吃什麼</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary: #ff9f43; --danger: #e11d48; --success: #26de81; --bg: #f1f5f9; --dark: #1e293b; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        .admin-toolbar { display: none; background: var(--dark); padding: 15px; border-radius: 12px; color: white; gap: 10px; overflow-x: auto; white-space: nowrap; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 2fr 1fr 1fr auto; gap: 20px; align-items: end; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        button { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-submit { background: var(--primary); color: white; }
        
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; min-width: 600px; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .btn-confirm { background: var(--success); color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        
        .dashboard { display: flex; gap: 20px; }
        .stat-card { flex: 1; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .stat-card p { font-size: 32px; font-weight: 900; margin: 10px 0 0 0; }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>午餐吃什麼</h1>
        
        <div><input type="checkbox" id="adminToggle" onclick="toggleAdminMode()"> 團主模式</div>
        <div id="adminToolbar" class="admin-toolbar">
            <button onclick="showStats()">📊 統計</button>
            <button onclick="clearOrders()">🧹 清空</button>
        </div>

        <div class="card">
            <h3>📝 新增點餐</h3>
            <div class="form-grid">
                <div>姓名<input type="text" id="userName"></div>
                <div>品項<input type="text" id="userItem"></div>
                <div>應付<input type="number" id="price"></div>
                <div>實付<input type="number" id="pay"></div>
                <button class="btn-submit" onclick="submitOrder()">送出</button>
            </div>
        </div>

        <div class="card">
            <h3>📝 所有未付款區</h3>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>姓名</th><th>品項</th><th>應付</th><th>實付</th><th>管理</th></tr></thead>
                    <tbody id="unpaidBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h3>✅ 所有已付款區</h3>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>姓名</th><th>品項</th><th>應付</th><th>實付</th><th>找零狀態</th><th>管理</th></tr></thead>
                    <tbody id="paidBody"></tbody>
                </table>
            </div>
        </div>

        <div class="dashboard">
            <div class="stat-card"><h3>總金額</h3><p id="totalNeed">0</p></div>
            <div class="stat-card"><h3>未付款金額</h3><p id="totalPending" style="color:var(--danger)">0</p></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://test-order-system-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let isAdmin = false;

        function toggleAdminMode() {
            isAdmin = document.getElementById('adminToggle').checked;
            document.getElementById('adminToolbar').style.display = isAdmin ? 'flex' : 'none';
            renderTable();
        }

        function submitOrder() {
            const name = document.getElementById('userName').value.trim();
            const item = document.getElementById('userItem').value.trim();
            const price = parseInt(document.getElementById('price').value) || 0;
            const pay = parseInt(document.getElementById('pay').value) || 0;
            if(!name || !item) return alert("請填寫資料");
            database.ref('orders').push({ name, item, price, pay, isPaid: false, changeSettled: false });
            document.getElementById('userName').value = '';
            document.getElementById('userItem').value = '';
            document.getElementById('price').value = '';
            document.getElementById('pay').value = '';
        }

        function markPaid(id) { database.ref('orders').child(id).update({ isPaid: true }); }
        function toggleChange(id, status) { database.ref('orders').child(id).update({ changeSettled: status }); }
        function deleteOrder(id) { if(confirm("確定刪除？")) database.ref('orders').child(id).remove(); }
        function clearOrders() { if(confirm("確定清空？")) database.ref('orders').remove(); }

        function renderTable() {
            database.ref('orders').on('value', (s) => {
                const orders = s.val();
                const uBody = document.getElementById('unpaidBody');
                const pBody = document.getElementById('paidBody');
                uBody.innerHTML = pBody.innerHTML = '';
                let tNeed = 0, tUnpaid = 0;
                
                if(orders) {
                    Object.keys(orders).forEach(id => {
                        const o = orders[id];
                        tNeed += o.price;
                        if(!o.isPaid) tUnpaid += o.price;
                        
                        if(o.isPaid) {
                            let change = o.pay - o.price;
                            let changeStatus = "";
                            if(change > 0) {
                                changeStatus = o.changeSettled ? 
                                    `<span onclick="toggleChange('${id}', false)" style="color:var(--success); cursor:pointer;">☑</span>` : 
                                    (isAdmin ? `<button class="btn-confirm" onclick="toggleChange('${id}', true)">找 ${change}</button>` : `找 ${change}`);
                            }
                            pBody.innerHTML += `<tr><td>${o.name}</td><td>${o.item}</td><td>${o.price}</td><td>${o.pay}</td><td>${changeStatus}</td><td>${isAdmin ? `<button onclick="deleteOrder('${id}')">❌</button>` : '🔒'}</td></tr>`;
                        } else {
                            uBody.innerHTML += `<tr><td>${o.name}</td><td>${o.item}</td><td>${o.price}</td><td>${o.pay}</td><td>⏳</td><td>${isAdmin ? `<button class="btn-confirm" onclick="markPaid('${id}')">✓ 收款</button> <button onclick="deleteOrder('${id}')">❌</button>` : '🔒'}</td></tr>`;
                        }
                    });
                }
                document.getElementById('totalNeed').innerText = tNeed;
                document.getElementById('totalPending').innerText = tUnpaid;
            });
        }
        
        function showStats() {
            database.ref('orders').once('value', (s) => {
                const orders = s.val();
                let stats = {};
                if(orders) {
                    Object.values(orders).forEach(o => {
                        if(!stats[o.item]) stats[o.item] = 0;
                        stats[o.item]++;
                    });
                    alert("叫餐統計:\n" + Object.entries(stats).map(([k,v]) => `${k}: ${v}份`).join('\n'));
                }
            });
        }
        
        renderTable();
    </script>
</body>
</html>
