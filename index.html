<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>午餐吃什麼</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary: #ff9f43; --danger: #e11d48; --success: #26de81; --bg: #f1f5f9; --dark: #1e293b; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        .admin-toolbar { display: none; background: var(--dark); padding: 15px; border-radius: 12px; color: white; gap: 10px; justify-content: center; align-items: center; }
        .status-banner { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-section { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1fr 2fr 1fr 1fr 1fr; gap: 15px; align-items: end; }
        
        .table-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: left; }
        
        .dashboard { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; }
        .dashboard-right { display: flex; flex-direction: column; gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .card-main { display: flex; flex-direction: column; justify-content: center; }
        .card h3 { margin: 0 0 10px; color: #64748b; font-size: 16px; }
        .card p { margin: 0; font-size: 40px; font-weight: 900; }
        .card-small p { font-size: 24px; }
        
        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="adminToolbar" class="admin-toolbar">...</div>
        
        <div class="form-section">
            <h3>📝 點餐</h3>
            <div class="form-grid">
                <input type="text" id="userName" placeholder="姓名">
                <input type="text" id="userItem" placeholder="品項">
                <input type="number" id="price" placeholder="應付">
                <input type="number" id="pay" placeholder="實付">
                <button onclick="submitOrder()">送出</button>
            </div>
        </div>

        <div class="table-container">
            <h3>📝 未付款</h3>
            <table>
                <thead><tr><th>姓名</th><th>品項</th><th>應付</th><th>實收</th><th>找零</th><th>操作</th></tr></thead>
                <tbody id="unpaidBody"></tbody>
            </table>
        </div>

        <div class="table-container">
            <h3>✅ 已付款</h3>
            <table>
                <thead><tr><th>姓名</th><th>品項</th><th>應付</th><th>實收</th><th>找零狀態</th><th>操作</th></tr></thead>
                <tbody id="paidBody"></tbody>
            </table>
        </div>

        <div class="dashboard">
            <div class="card card-main">
                <h3>總金額</h3>
                <p id="totalNeed">0</p>
            </div>
            <div class="dashboard-right">
                <div class="card card-small">
                    <h3>已收現金</h3>
                    <p id="totalGet">0</p>
                </div>
                <div class="card card-small">
                    <h3>未付款金額</h3>
                    <p id="totalPending">0</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://test-order-system-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function submitOrder() {
            const name = document.getElementById('userName').value;
            const item = document.getElementById('userItem').value;
            const price = parseInt(document.getElementById('price').value) || 0;
            const pay = parseInt(document.getElementById('pay').value) || 0;
            db.ref('orders').push({ name, item, price, pay, isPaid: false, changeSettled: false });
        }

        db.ref('orders').on('value', (s) => {
            const orders = s.val() || {};
            let tNeed = 0, tGet = 0, tUnpaid = 0;
            const unpaidBody = document.getElementById('unpaidBody');
            const paidBody = document.getElementById('paidBody');
            unpaidBody.innerHTML = paidBody.innerHTML = '';

            Object.keys(orders).forEach(id => {
                const o = orders[id];
                tNeed += o.price;
                const diff = o.pay - o.price;
                
                if (o.isPaid) {
                    tGet += (o.changeSettled || diff <= 0) ? o.price : o.pay;
                    paidBody.innerHTML += `<tr><td>${o.name}</td><td>${o.item}</td><td>${o.price}</td><td>${o.pay}</td>
                    <td>${diff > 0 ? (o.changeSettled ? '✅' : '❌'+diff) : '無'}</td><td>...</td></tr>`;
                } else {
                    tUnpaid += o.price;
                    unpaidBody.innerHTML += `<tr><td>${o.name}</td><td>${o.item}</td><td>${o.price}</td><td>${o.pay}</td>
                    <td>${diff > 0 ? diff : '0'}</td><td>...</td></tr>`;
                }
            });
            document.getElementById('totalNeed').innerText = tNeed;
            document.getElementById('totalGet').innerText = tGet;
            document.getElementById('totalPending').innerText = tUnpaid;
        });
    </script>
</body>
</html>
