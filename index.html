<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>00000000000000000</title>
    
    <meta property="og:title" content="00000000000000000">
    <meta property="og:description" content="點餐系統">
    <meta name="description" content="點餐系統">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://my-lunch.github.io/eat/">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary: #ff9f43; --danger: #e11d48; --success: #26de81; --bg: #f1f5f9; --dark: #1e293b; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: block; color: var(--dark); overflow-x: hidden; }
        .container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        .page-title-section { text-align: center; margin-top: 10px; margin-bottom: 5px; }
        .page-title-section h1 { margin: 0; font-size: 32px; font-weight: 900; color: var(--dark); letter-spacing: 2px; }
        .page-title-section h2 { margin: 6px 0 0 0; font-size: 16px; font-weight: bold; color: #64748b; letter-spacing: 5px; }

        .admin-toolbar { display: none; flex-direction: row; flex-wrap: nowrap; background: var(--dark); padding: 12px 20px; border-radius: 12px; align-items: center; justify-content: center; margin-bottom: 10px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); gap: 12px; box-sizing: border-box; width: 100%; white-space: nowrap; overflow-x: auto; }
        .admin-toolbar input { padding: 8px 12px; border: 1px solid #444; background: #2d3748; color: white; border-radius: 6px; font-size: 14px; height: 36px; box-sizing: border-box; }
        .file-input { width: 180px; color: #cbd5e1; font-size: 13px; border: none !important; background: transparent !important; padding: 0 !important; cursor: pointer; }
        .admin-toolbar button { padding: 0 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; height: 36px; display: inline-flex; align-items: center; justify-content: center; }
        .btn-sync { background: var(--primary); color: white; }
        .btn-stats { background: #a55eea; color: white; }
        .btn-clear { background: #747d8c; color: white; }

        .status-banner { background: white; padding: 20px 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .announcement-row { display: flex; justify-content: space-between; align-items: center; }
        .cash-info { font-size: 24px; font-weight: 800; color: var(--dark); } 
        .time-info { display: flex; align-items: baseline; color: var(--danger); background: #fff1f2; padding: 8px 20px; border-radius: 8px; } 
        .time-value { font-size: 28px; font-weight: 900; margin: 0 5px; }

        .menu-wrapper { width: 100%; display: none; text-align: center; }
        .menu-display { width: 100%; height: auto; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: block; }
        
        .dashboard { display: flex; gap: 20px; }
        .card { flex: 1; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .card p { margin: 0; font-size: 36px; font-weight: 900; } 
        .text-red { color: var(--danger); }

        .form-section { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1fr 2fr 1fr 1fr 1.2fr; gap: 25px; align-items: end; } 
        .form-group label { display: block; margin-bottom: 10px; font-weight: 900; color: var(--dark); }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; height: 48px; }
        
        .table-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; min-width: 600px; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; background: #f8fafc; padding: 18px 24px; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 18px 24px; border-bottom: 1px solid #f1f5f9; font-size: 16px; }
        
        .action-btns { display: flex; gap: 8px; }
        .btn-edit { background: #4b5563; color: white; border: none; padding: 8px 14px; border-radius: 6px; font-weight: bold; }
        .btn-del { color: #cbd5e1; background: none; border: none; font-size: 16px; cursor: pointer; }
        .btn-del:hover { color: var(--danger); }
        .status-icon-only { font-size: 18px; font-weight: bold; }
        
        .page-footer { text-align: center; color: #94a3b8; font-size: 13px; font-weight: bold; padding: 15px 0 30px 0; }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .status-icon-only { font-size: 12px !important; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="page-title-section"><h1>00000000000000000</h1><h2>點餐系統</h2></div>

        <div class="admin-toolbar" id="adminToolbar">
            <input type="text" id="annInput" placeholder="修改公告...">
            <input type="text" id="timeInput" placeholder="截止時間...">
            <button class="btn-sync" onclick="updateAnnouncement()">同步</button>
            <input type="file" accept="image/*" class="file-input" onchange="uploadMenu(this)">
            <button class="btn-stats" onclick="showStats()">📊 統計</button>
            <button class="btn-clear" onclick="clearOrders()">🧹 清空</button>
        </div>
        
        <div class="status-banner">
            <div class="announcement-row">
                <div id="announceText" class="cash-info">📢 收現金 / 收 LINE Pay</div>
                <div class="time-info"><span id="timeText" class="time-value">未設定</span></div>
                <input type="checkbox" id="adminToggle" onclick="toggleAdminMode()" title="隱藏開關">
            </div>
        </div>

        <div id="menuWrapper" class="menu-wrapper"><img id="menuImg" class="menu-display"></div>

        <div class="form-section">
            <h3>📝 點餐</h3>
            <div class="form-grid">
                <div class="form-group"><label>姓名</label><input type="text" id="userName"></div>
                <div class="form-group"><label>品項</label><input type="text" id="userItem"></div>
                <div class="form-group"><label>應付</label><input type="number" id="price"></div>
                <div class="form-group"><label>實付</label><input type="number" id="pay"></div>
                <button class="btn-submit" onclick="submitOrder()">送出</button>
            </div>
        </div>

        <div class="table-container">
            <h3>📝 所有未付款區</h3>
            <table id="unpaidTable">
                <thead><tr><th>姓名</th><th>品項</th><th>應付</th><th>實收</th><th>找零狀態</th><th>管理</th></tr></thead>
                <tbody id="unpaidBody"></tbody>
            </table>
        </div>

        <div class="table-container">
            <h3>✅ 所有已付款區</h3>
            <table id="paidTable">
                <thead><tr><th>姓名</th><th>品項</th><th>應付</th><th>實收</th><th>找零狀態</th><th>管理</th></tr></thead>
                <tbody id="paidBody"></tbody>
            </table>
        </div>

        <div class="dashboard">
            <div class="card"><h3>總金額</h3><p id="totalNeed">0</p></div>
            <div class="card"><h3>未付款金額</h3><p id="totalPending" class="text-red">0</p></div>
        </div>

        <footer class="page-footer">今天也要好好吃飯 🍜 Have a nice lunch</footer>
    </div>

    <div id="modalOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:99;" onclick="closeModal()"></div>
    <div id="statsModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:30px; border-radius:15px; z-index:100; width:90%; max-width:600px;">
        <h3>📞 叫餐統計</h3>
        <div id="statsContent"></div>
        <button onclick="closeModal()">關閉</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://test-order-system-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let myId = localStorage.getItem('myDeviceId') || Math.random().toString(36).substr(2, 9);
        localStorage.setItem('myDeviceId', myId);

        function toggleAdminMode() {
            let isAdm = document.getElementById('adminToggle').checked;
            document.getElementById('adminToolbar').style.display = isAdm ? 'flex' : 'none';
            database.ref('orders').once('value', s => renderTable(s.val()));
        }

        function submitOrder() {
            const name = document.getElementById('userName').value.trim();
            const item = document.getElementById('userItem').value.trim();
            const price = parseInt(document.getElementById('price').value) || 0;
            const pay = parseInt(document.getElementById('pay').value) || 0;
            if(!name || !item) return alert("請填寫姓名與品項");
            database.ref('orders').push({ name, item, price, pay, isPaid: false, changeSettled: false, owner: myId });
            document.getElementById('userName').value = ''; document.getElementById('userItem').value = '';
            document.getElementById('price').value = ''; document.getElementById('pay').value = '';
        }

        function markPaid(id) { database.ref('orders').child(id).update({ isPaid: true }); }
        function settleChange(id, status) { database.ref('orders').child(id).update({ changeSettled: status }); }
        function deleteOrder(id) { if(confirm("確定刪除？")) database.ref('orders').child(id).remove(); }
        function clearOrders() { if(confirm("確定清空？")) database.ref('orders').remove(); }

        function renderTable(orders) {
            const uBody = document.getElementById('unpaidBody');
            const pBody = document.getElementById('paidBody');
            uBody.innerHTML = pBody.innerHTML = '';
            let tNeed = 0, tUnpaid = 0;
            let isAdminMode = document.getElementById('adminToggle').checked;

            if(orders) {
                Object.keys(orders).forEach(id => {
                    const o = orders[id];
                    tNeed += o.price;
                    if(!o.isPaid) tUnpaid += o.price;
                    
                    const changeAmt = o.pay - o.price;
                    if(o.isPaid) {
                        let status = o.changeSettled ? `<span onclick="settleChange('${id}', false)" class="status-icon-only" style="color:var(--success); cursor:pointer;">☑</span>` : (isAdminMode ? `<button class="btn-confirm" onclick="settleChange('${id}', true)">☒ 找 ${changeAmt}</button>` : `<span class="status-icon-only" style="color:var(--danger)">☒ 待找 ${changeAmt}</span>`);
                        pBody.innerHTML += `<tr><td>${o.name}</td><td>${o.item}</td><td>${o.price}</td><td>${o.pay}</td><td>${status}</td><td>${isAdminMode ? `<button onclick="deleteOrder('${id}')">❌</button>` : '🔒'}</td></tr>`;
                    } else {
                        uBody.innerHTML += `<tr><td>${o.name}</td><td>${o.item}</td><td>${o.price}</td><td>${o.pay}</td><td>${changeAmt > 0 ? '找零 '+changeAmt : '0'}</td><td>${isAdminMode ? `<button class="btn-confirm" onclick="markPaid('${id}')">✓ 收款</button> <button onclick="deleteOrder('${id}')">❌</button>` : '🔒'}</td></tr>`;
                    }
                });
            }
            document.getElementById('totalNeed').innerText = tNeed;
            document.getElementById('totalPending').innerText = tUnpaid;
        }

        database.ref('orders').on('value', (s) => renderTable(s.val()));

        function showStats() {
            database.ref('orders').once('value', (s) => {
                const orders = s.val();
                let stats = {}, total = 0;
                if(orders) {
                    Object.values(orders).forEach(o => {
                        o.item.split(/[+＋]/).forEach(i => {
                            let item = i.trim();
                            if(!stats[item]) stats[item] = { count: 0, users: [] };
                            stats[item].count++;
                            if(!stats[item].users.includes(o.name)) stats[item].users.push(o.name);
                            total++;
                        });
                    });
                }
                document.getElementById('statsContent').innerHTML = Object.entries(stats).map(([k,v]) => `<div class="stats-item">🍱 ${k} × ${v.count} (${v.users.join('、')})</div>`).join('');
                document.getElementById('statsModal').style.display = 'block';
                document.getElementById('modalOverlay').style.display = 'block';
            });
        }
        function closeModal() { document.getElementById('statsModal').style.display = 'none'; document.getElementById('modalOverlay').style.display = 'none'; }
    </script>
</body>
</html>
