<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃什麼</title>
    
    <meta property="og:title" content="👑 今天吃什麼">
    <meta property="og:description" content="點擊進入點餐 🍔">
    <meta name="description" content="點擊進入點餐 🍔">
    <meta property="og:type" content="website">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary: #ff9f43; --danger: #e11d48; --success: #26de81; --bg: #f1f5f9; --dark: #1e293b; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: block; color: var(--dark); overflow-x: hidden; }
        
        .admin-toolbar { display: none; background: var(--dark); padding: 12px 25px; border-radius: 12px; align-items: center; justify-content: space-between; margin-bottom: 25px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); flex-wrap: wrap; gap: 15px; box-sizing: border-box; }
        .toolbar-left { display: flex; align-items: center; gap: 15px; flex-grow: 1; flex-wrap: wrap; }
        .toolbar-left input { padding: 8px 12px; border: 1px solid #444; background: #2d3748; color: white; border-radius: 6px; font-size: 14px; }
        .toolbar-left input::placeholder { color: #a0aec0; }
        
        .toolbar-btns { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .toolbar-btns button { padding: 8px 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-sync { background: var(--primary); color: white; }
        .btn-stats { background: #a55eea; color: white; }
        .btn-clear { background: #747d8c; color: white; }

        .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 25px; }
        
        .status-banner { background: white; padding: 20px 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .announcement-row { display: flex; justify-content: space-between; align-items: center; }
        
        .cash-info { font-size: 24px; font-weight: 800; color: var(--dark); } 
        
        .time-info-wrapper { display: flex; align-items: center; }
        .time-info { display: flex; align-items: baseline; font-size: 18px; font-weight: bold; color: var(--danger); background: #fff1f2; padding: 8px 20px; border-radius: 8px; } 

        .admin-checkbox-secret { width: 14px; height: 14px; cursor: pointer; opacity: 0.1; margin-left: 10px; }
        .admin-checkbox-secret:hover { opacity: 0.6; }

        .menu-wrapper { width: 100%; display: none; text-align: center; }
        .menu-display { width: 100%; height: auto; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: block; }
        
        .dashboard { display: flex; gap: 20px; }
        .card { flex: 1; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .card h3 { margin: 0 0 10px; color: #64748b; font-size: 16px; font-weight: bold; }
        .card p { margin: 0; font-size: 36px; font-weight: 900; } 
        .text-red { color: var(--danger); }

        .form-section { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1.2fr 2fr 1fr 1fr 1fr 1.2fr; gap: 25px; align-items: end; } 
        .col-span-2 { grid-column: span 2; } 
        .form-group label { display: block; margin-bottom: 10px; font-weight: 900; font-size: 15px; color: var(--dark); }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; box-sizing: border-box; height: 48px; }
        
        .live-change-box { background: #f8fafc; border: 2px dashed #cbd5e1; padding: 0 10px; border-radius: 8px; text-align: center; font-size: 18px; font-weight: 900; color: var(--dark); height: 48px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; }
        .live-change-box.has-change { color: var(--danger); background: #fff1f2; border-color: var(--danger); }

        .table-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .table-container h3 { margin-top: 0; padding-bottom: 15px; border-bottom: 4px solid var(--bg); font-weight: 900; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; background: #f8fafc; padding: 15px; color: #64748b; font-weight: bold; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 16px; }
        
        .btn-confirm { background: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: 900; cursor: pointer; margin-right: 5px; }
        .btn-edit { background: #4b5563; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-save { background: #2563eb; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-del { color: #cbd5e1; background: none; border: none; cursor: pointer; font-size: 16px; padding: 6px; margin-left: 5px; border-radius: 6px;}
        .btn-del:hover { background: #fee2e2; color: var(--danger); }
        .readonly-text { color: #94a3b8; font-size: 14px; font-weight: bold; }
        .inline-input { padding: 8px; border: 2px solid var(--primary); border-radius: 6px; font-size: 15px; width: 90%; box-sizing: border-box; font-weight: bold; }

        #statsModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 100px rgba(0,0,0,0.4); z-index: 100; min-width: 350px; max-width: 500px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.8); z-index: 99; }
        .stats-header { font-size: 20px; font-weight: 900; color: var(--dark); margin-bottom: 15px; }
        .stats-total { font-size: 18px; font-weight: bold; color: #4b5563; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px dashed #cbd5e1; }
        .stats-list { max-height: 350px; overflow-y: auto; padding-right: 10px; }
        .stats-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 16px; }

        @media (max-width: 768px) {
            body { padding: 10px 0; }
            .container { padding: 0 10px; }
            
            .admin-toolbar { padding: 15px; flex-direction: column; align-items: stretch; margin: 0 10px 20px 10px; gap: 15px; }
            .toolbar-left { flex-direction: column; align-items: stretch; width: 100%; }
            .toolbar-left input, .toolbar-btns { flex-direction: column; align-items: stretch; width: 100%; }
            .toolbar-btns button, .toolbar-left button { width: 100%; padding: 12px; }

            .announcement-row { flex-direction: column; gap: 15px; align-items: center; text-align: center; }
            .cash-info { font-size: 22px; }
            .time-info { width: 100%; box-sizing: border-box; font-size: 16px; justify-content: center; }
            
            .dashboard { flex-direction: column; gap: 10px; }
            .form-grid { grid-template-columns: 1fr; gap: 15px; }
            .col-span-2 { grid-column: span 1; }
            .menu-wrapper { margin-left: -10px; width: 100vw; margin-top: 20px; }
            .menu-display { border-radius: 0; border: none; max-height: none; width: 100%; box-shadow: none; }
            
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { margin-bottom: 15px; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
            td { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #f1f5f9; padding: 8px 0; }
            td:last-child { border-bottom: none; }
            td::before { content: attr(data-label); font-weight: 900; color: #64748b; }
            .btn-confirm, .btn-edit, .btn-save, .btn-del { padding: 10px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="admin-toolbar" id="adminToolbar">
        <div class="toolbar-left">
            <span style="font-weight:bold; color:var(--primary); text-align:center; display:block; width:100%; margin-bottom:5px;">👑 團主控制面板</span>
            <input type="text" id="annInput" placeholder="修改收款公告...">
            <input type="text" id="timeInput" placeholder="時間(例如 11:00)">
            <button class="btn-sync" onclick="updateAnnouncement()">同步公告與時間</button>
            <span style="font-weight:bold; font-size:14px; margin-top:5px;">上傳菜單：</span>
            <input type="file" accept="image/*" style="color: #cbd5e1; font-size: 13px;" onchange="uploadMenu(this)">
        </div>
        <div class="toolbar-btns">
            <button class="btn-stats" onclick="showStats()">📊 叫餐統計清單</button>
            <button class="btn-clear" onclick="clearOrders()">🧹 淨空所有訂單</button>
        </div>
    </div>

        <div class="status-banner">
            <div class="announcement-row">

                    <div class="time-info">截止時間：<span id="timeText" style="font-size:32px; font-weight:900; margin:0 5px; line-height:1;">未設定</span></div>
